// ===== VOCAB管理：ストレージ拡張対応 =====
const VOCAB_STORAGE_KEY = "vocab:extended";
async function loadVocab() {
  try {
    const r = localStorage.getItem(VOCAB_STORAGE_KEY) ? {
      value: localStorage.getItem(VOCAB_STORAGE_KEY)
    } : null;
    if (r) {
      const extra = JSON.parse(r.value);
      // 重複除去してマージ
      const baseWords = new Set(BASE_VOCAB.map(v => v.word));
      const merged = [...BASE_VOCAB, ...extra.filter(v => !baseWords.has(v.word))];
      return merged;
    }
  } catch (e) {}
  return BASE_VOCAB;
}
async function saveExtraVocab(newWords) {
  try {
    let extra = [];
    try {
      const r = localStorage.getItem(VOCAB_STORAGE_KEY) ? {
        value: localStorage.getItem(VOCAB_STORAGE_KEY)
      } : null;
      if (r) extra = JSON.parse(r.value);
    } catch (e) {}
    const baseWords = new Set(BASE_VOCAB.map(v => v.word));
    const existWords = new Set([...baseWords, ...extra.map(v => v.word)]);
    const toAdd = newWords.filter(v => !existWords.has(v.word));
    const updated = [...extra, ...toAdd];
    localStorage.setItem(VOCAB_STORAGE_KEY, JSON.stringify(updated));
    return toAdd.length;
  } catch (e) {
    return 0;
  }
}
async function generateMoreVocab(theme, stage, count = 30) {
  const stageLabel = stage === 1 ? "中1レベル（基本）" : stage === 2 ? "中2レベル（応用）" : "中3〜高校基礎レベル";
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 2000,
      messages: [{
        role: "user",
        content: `日本の英語学習者向けに${stageLabel}の英単語を${count}語生成してください。
テーマ: ${theme || "日常・学校・自然・感情・行動"}

条件:
- 中学〜高校基礎レベルで実用的な単語
- 重複しにくい多様な単語を選ぶ
- JSONのみ出力。説明不要。

[{"word":"...", "reading":"カタカナ読み", "meaning":"日本語の意味", "stage":${stage}}]`
      }]
    })
  });
  const d = await res.json();
  const text = d.content?.[0]?.text || "[]";
  return JSON.parse(text.replace(/```json|```/g, "").trim());
}

// 習熟度スコア計算（0〜100）
function masteryScore(mem) {
  if (!mem) return -1; // 未回答
  const total = (mem.ok || 0) + (mem.ng || 0);
  if (total === 0) return -1;
  const rate = (mem.ok || 0) / total;
  // 回答回数も考慮（多いほど信頼性UP）
  return Math.round(rate * 100);
}

// 習熟度ラベル
function masteryLabel(score) {
  if (score < 0) return {
    label: "未回答",
    color: "#d1d5db",
    bg: "#f9fafb"
  };
  if (score >= 80) return {
    label: "完璧！",
    color: "#059669",
    bg: "#d1fae5"
  };
  if (score >= 60) return {
    label: "ほぼOK",
    color: "#0284c7",
    bg: "#e0f2fe"
  };
  if (score >= 40) return {
    label: "もう少し",
    color: "#d97706",
    bg: "#fef3c7"
  };
  return {
    label: "要復習",
    color: "#dc2626",
    bg: "#fee2e2"
  };
}

function speakWord(word) {

  u.rate = 0.85;
  speakingWord = word;
  window.speechSynthesis.speak(u);
}

// ===== ヘルパー =====
function stageColor(s) {
  return s === 1 ? "#4ade80" : s === 2 ? "#60a5fa" : "#f472b6";
}
function stageDark(s) {
  return s === 1 ? "#16a34a" : s === 2 ? "#2563eb" : "#be185d";
}
function stageGrad(s) {
  return s === 1 ? "linear-gradient(135deg,#16a34a,#4ade80)" : s === 2 ? "linear-gradient(135deg,#2563eb,#60a5fa)" : "linear-gradient(135deg,#be185d,#f472b6)";
}
function buildVQ(list, fullList) {
  const pool = fullList || list;
  const s = [...list].sort(() => Math.random() - 0.5).slice(0, 10);
  return s.map(item => {
    const w = pool.filter(v => v.word !== item.word).sort(() => Math.random() - 0.5).slice(0, 3).map(v => v.meaning);
    return {
      word: item.word,
      reading: item.reading,
      correct: item.meaning,
      options: [...w, item.meaning].sort(() => Math.random() - 0.5)
    };
  });
}

const QUESTION_TYPE_LABELS = {
  choice: "4択",
  fillblank: "穴埋め",
  rearrange: "並べ替え",
  errorfix: "誤文訂正",
  translate: "英作文"
};
async function generateQuizForTopic(topic, count = 6) {
  const prompt = `あなたは中学英語の問題作成AIです。

文法項目「${topic.title}」（${topic.summary}）について、多様な形式で${count}問作成してください。

【必須条件】
- 問題形式を必ずMIXすること（choice/fillblank/rearrange/errorfix/translate から選ぶ）
- 前回と違うパターンになるよう、主語・動詞・場面をランダムに変える
- 中学生レベルで解ける内容

【形式の定義】
- choice: 4択選択問題 → choices配列に4つの選択肢、answerに正解
- fillblank: 穴埋め → qに「___」を含む英文または日本語説明、answerに英語1語または短い語句
- rearrange: 並べ替え → qに日本語の意味、choicesに単語リスト、answerにスペース区切りの正解文
- errorfix: 誤文訂正 → qに間違いのある英文（どこかが間違い）、answerに正しい英文全体
- translate: 日本語→英語 → qに日本語文、answerに英文

【出力フォーマット】
JSONのみ。説明文・マークダウン記号は一切不要。
[
  {"type":"choice","q":"問題文","choices":["A","B","C","D"],"answer":"B","explanation":"簡潔な解説（日本語20字以内）"},
  {"type":"fillblank","q":"She ___ to school yesterday.","answer":"went","explanation":"goの過去形はwent"},
  ...
]`;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 2000,
      messages: [{
        role: "user",
        content: prompt
      }]
    })
  });
  const data = await res.json();
  const text = data.content?.[0]?.text || "[]";
  const clean = text.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

async function saveProgress(topicId, correct, total) {
  try {
    let existing = {
      correct: 0,
      total: 0,
      history: []
    };
    try {
      const r = localStorage.getItem(`prog:${topicId}`) ? {
        value: localStorage.getItem(`prog:${topicId}`)
      } : null;
      if (r) existing = JSON.parse(r.value);
    } catch (e) {}
    const updated = {
      correct: existing.correct + correct,
      total: existing.total + total,
      history: [...(existing.history || []).slice(-9), {
        correct,
        total,
        date: new Date().toLocaleDateString("ja-JP")
      }]
    };
    localStorage.setItem(`prog:${topicId}`, JSON.stringify(updated));
    return updated;
  } catch (e) {
    return null;
  }
}

  } catch (e) {
    return null;
  }

const WEAK_STOCK_KEY = "practice:weakstock";
async function addToWeakStock(item) {
  try {
    let stock = [];
    try {
      const r = localStorage.getItem(WEAK_STOCK_KEY) ? {
        value: localStorage.getItem(WEAK_STOCK_KEY)
      } : null;
      if (r) stock = JSON.parse(r.value);
    } catch (e) {}
    // 重複チェック（同じenを持つものは更新）
    const idx = stock.findIndex(s => s.en === item.en);
    if (idx >= 0) stock[idx] = {
      ...stock[idx],
      count: (stock[idx].count || 0) + 1,
      lastDate: new Date().toLocaleDateString("ja-JP")
    };else stock.push({
      ...item,
      count: 1,
      lastDate: new Date().toLocaleDateString("ja-JP")
    });
    localStorage.setItem(WEAK_STOCK_KEY, JSON.stringify(stock));
  } catch (e) {}
}
async function loadWeakStock() {
  try {
    const r = localStorage.getItem(WEAK_STOCK_KEY) ? {
      value: localStorage.getItem(WEAK_STOCK_KEY)
    } : null;
    return r ? JSON.parse(r.value) : [];
  } catch (e) {
    return [];
  }
}
async function removeFromWeakStock(en) {
  try {
    const r = localStorage.getItem(WEAK_STOCK_KEY) ? {
      value: localStorage.getItem(WEAK_STOCK_KEY)
    } : null;
    if (!r) return;
    const stock = JSON.parse(r.value).filter(s => s.en !== en);
    localStorage.setItem(WEAK_STOCK_KEY, JSON.stringify(stock));
  } catch (e) {}
}
